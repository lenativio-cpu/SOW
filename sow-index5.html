// ── buildTasksByFase: tarefas agrupadas por fase ──────────────────────────────
// É o novo coração da view de tarefas. Mostra cada fase como seção expansível,
// com progresso interno, cor da fase, e todas as tarefas agrupadas.
function buildTasksByFase(nat){
  // Separar concluídas
  const pending = nat.filter(t=>!t.done);
  const done    = nat.filter(t=>t.done);

  // Agrupar pendentes por fase
  const byFase = {};
  const semFase = [];
  for(const t of pending){
    const fId = getTarefaFase(t);
    if(fId){ if(!byFase[fId]) byFase[fId]=[]; byFase[fId].push(t); }
    else semFase.push(t);
  }

  let html = '';

  // Renderiza cada fase na ordem correta
  for(const fase of FASES){
    const tasks = byFase[fase.id]||[];
    const allFaseTasks = nat.filter(t=>getTarefaFase(t)===fase.id);
    const doneFase = allFaseTasks.filter(t=>t.done).length;
    const totalFase = allFaseTasks.length;
    const pctFase = totalFase ? Math.round(doneFase/totalFase*100) : 0;
    const isAtiva = bN_global && bN_global.faseAtiva && bN_global.faseAtiva.id===fase.id;

    // Cabeçalho da fase
    const faseKey = 'fase_open_'+fase.id;
    const isOpen = faseGroupOpen[faseKey]!==false; // default: aberto

    html += '<div style="margin-bottom:16px">'
      +'<div onclick="B.toggleFaseGroup(\''+fase.id+'\')" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;user-select:none">'
        +'<div style="width:10px;height:10px;border-radius:50%;background:'+fase.cor+';flex-shrink:0;'+(isAtiva?'box-shadow:0 0 0 3px '+fase.cor+'33;':'')+'"></div>'
        +'<div style="font-size:12px;font-weight:600;color:'+(tasks.length||isAtiva?fase.cor:'var(--tx3)')+';flex:1">'
          +fase.label
          +(isAtiva?'<span style="font-size:10px;background:'+fase.cor+'22;color:'+fase.cor+';padding:1px 8px;border-radius:10px;margin-left:8px;font-weight:700">fase atual</span>':'')
        +'</div>'
        +(totalFase?'<div style="font-size:11px;color:var(--tx3)">'+doneFase+'/'+totalFase+'</div>':'')
        +'<div style="font-size:11px;color:var(--tx3)">'+(isOpen?'▾':'▸')+'</div>'
      +'</div>';

    if(isOpen){
      if(tasks.length){
        html += '<div class="task-list">'+tasks.map(t=>buildTask(t)).join('')+'</div>';
      } else if(totalFase===0){
        html += '<div style="font-size:12px;color:var(--tx3);padding:4px 0 4px 20px">Nenhuma tarefa cadastrada nesta fase.</div>';
      } else {
        html += '<div style="font-size:12px;color:var(--n);padding:4px 0 4px 20px">✓ Todas as tarefas concluídas</div>';
      }
    }
    html += '</div>';
  }

  // Tarefas sem fase
  if(semFase.length){
    html += '<div style="margin-bottom:16px">'
      +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:8px">Sem fase</div>'
      +'<div class="task-list">'+semFase.map(t=>buildTask(t)).join('')+'</div>'
      +'</div>';
  }

  // Concluídas (todas as fases)
  html += done.length
    ? '<button class="done-tog" onclick="B.toggleDN()">'+(showDN?'▾':'▸')+' concluídas ('+done.length+')</button>'
      +(showDN?'<div class="task-list" style="margin-top:8px">'+done.map(t=>buildTask(t)).join('')+'</div>':'')
    : '';

  // Barra de ação de fundo
  html += '<div class="add-bar" style="margin-top:16px">'
    +buildDriveChip('q')
    +'<button class="btn-sm" style="font-size:11px;color:var(--tx3)" onclick="B.archiveFixed(\'q\')">📦 arquivar</button>'
    +'</div>';

  return html;
}

// ── buildPrioridades: nova home — painel de decisão semanal ──────────────────
function buildPrioridades(nat, bN, allMs, nm, prios){
  if(!prios) prios = calcPrioridades(nat);
  if(!nm) nm = getNearestMilestone('q');

  const diasSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const hoje=new Date(TODAY);
  const dataStr=diasSemana[hoje.getDay()]+', '+hoje.getDate()+' de '+meses[hoje.getMonth()];

  // ── Cabeçalho ─────────────────────────────────────────────────────────
  const header='<div class="prio-header">'
    +'<div>'
      +'<div class="prio-semana"><strong>Esta semana</strong></div>'
      +'<div style="font-size:13px;color:var(--tx3);margin-top:2px">'+dataStr
        +(bN.faseAtiva?' · <span style="color:'+bN.faseAtiva.cor+';font-weight:500">'+bN.faseAtiva.label+'</span>':'')
      +'</div>'
    +'</div>'
    +'</div>';

  // ── Milestone próximo ─────────────────────────────────────────────────
  const msCard = nm
    ? '<div class="home-ms" style="margin-bottom:16px">'
        +'<div style="text-align:center;min-width:44px">'
          +'<div class="home-ms-dias" style="color:'+(nm.days<=3?'var(--urg)':nm.days<=7?'#D85A30':'var(--n)')+'">'+nm.days+'</div>'
          +'<div style="font-size:10px;color:var(--tx3)">dias</div>'
        +'</div>'
        +'<div class="home-ms-info">'
          +'<div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:2px">próximo milestone</div>'
          +'<div class="home-ms-label">'+esc(nm.label)+'</div>'
          +'<div class="home-ms-data">'+nm.date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+'</div>'
        +'</div>'
        +(nm.days<=3?'<span style="font-size:11px;background:var(--urgl);color:var(--urg);padding:3px 8px;border-radius:8px;font-weight:500;flex-shrink:0">urgente</span>':'')
        +'<button onclick="B.openEditMilestone(\'q\',\''+nm.id+'\')" title="Editar" style="background:none;border:0.5px solid var(--bd);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--tx3);flex-shrink:0">✎</button>'
      +'</div>'
    : '<div style="padding:12px;background:var(--surf);border:0.5px dashed var(--bds);border-radius:var(--rads);font-size:13px;color:var(--tx3);margin-bottom:16px">Nenhum milestone cadastrado — <button class="btn-sm" onclick="B.openAddMilestone(\'q\')">adicionar</button></div>';

  // ── Card de tarefa ────────────────────────────────────────────────────
  // SEM onclick no card — só checkbox faz toggle, duplo clique no título edita
  function prioCard(t, grupo){
    const fase=getFase(getTarefaFase(t));
    const stKey=(S.taskStatus||{})[t.id]||'and';
    const stObj=SM[stKey]||SM.and;
    const title=getTarefaTitle(t);
    const date=getTarefaDate(t);
    const dias=t._s?t._s.diasAteDeadline:999;
    const dateColor=dias<0?'var(--urg)':dias<=3?'#D85A30':'var(--tx3)';
    const dateLabel=dias<0?'⚠ '+Math.abs(dias)+'d atrás':date&&date!=='a definir'?date.replace('–','→'):'';
    const done=t.done||false;
    const cmtCount=((S.taskComments||{})[t.id]||[]).length;
    const tid=t.id; // capturado antes do retorno

    // Monta o HTML do card em partes para clareza
    const editBtn='<button class="prio-card-edit" onclick="B.editTaskInline(\''+tid+'\')" title="Editar">✎</button>';

    const checkbox='<div class="prio-cb-wrap">'
      +'<div class="cb '+(done?'on-q':'')+'" id="cb-'+tid+'"'
        +' onclick="B.toggleTask(\''+tid+'\',\'q\')"'
        +' role="checkbox" aria-checked="'+done+'" tabindex="0"'
        +' onkeydown="if(event.key===\' \'||event.key===\'Enter\'){B.toggleTask(\''+tid+'\',\'q\');event.preventDefault();}">'
        +'<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +'</div>'
      +'</div>';

    const statusSel='<select class="prio-status-sel '+stObj.cls+'" onclick="event.stopPropagation()" onchange="B.setStatus(\''+tid+'\',this)">'
      +SM_ORDER.map(k=>'<option value="'+k+'"'+(k===stKey?' selected':'')+'>'+SM[k].label+'</option>').join('')
      +'</select>';

    const cmtBtn='<button onclick="B.toggleCmt(\''+tid+'\')" style="background:none;border:none;cursor:pointer;font-size:11px;color:'+(cmtCount?'var(--n)':'var(--tx3)')+';padding:0;margin-left:2px" title="Comentários">💬'+(cmtCount?' '+cmtCount:'')+'</button>';

    const body='<div class="prio-body" style="padding-right:28px">'
      +'<div class="prio-title '+(done?'done-title':'')+'">'+esc(title)+'</div>'
      +'<div class="prio-meta">'
        +(fase?'<span class="prio-fase" style="background:'+fase.cor+'22;color:'+fase.cor+'">'+fase.id+'</span>':'')
        +(t.who?'<span class="prio-who">'+esc(t.who)+'</span>':'')
        +(dateLabel?'<span class="prio-date" style="color:'+dateColor+'">'+esc(dateLabel)+'</span>':'')
        +statusSel
        +cmtBtn
      +'</div>'
      // Painel de comentários começa VAZIO — populado só ao abrir
      // Evita IDs duplicados com a view Tarefas que fica no DOM ao mesmo tempo
      +'<div id="cmt-'+tid+'" hidden></div>'
      +'</div>';

    return '<div class="prio-card '+grupo+(done?' done':'')+'" id="pc-'+tid+'">'
      +editBtn
      +checkbox
      +body
      +'</div>';
  }

  // ── Grupos de prioridade ──────────────────────────────────────────────
  const GRUPOS = [
    {id:'agora',  label:'Agora',       dot:'var(--urg)', cls:'urgente', tasks:prios.agora },
    {id:'semana', label:'Esta semana', dot:'#D85A30',    cls:'semana',  tasks:prios.semana},
    {id:'radar',  label:'No radar',    dot:'var(--p)',   cls:'radar',   tasks:prios.radar },
  ];

  let gruposHtml='';
  for(const g of GRUPOS){
    if(!g.tasks.length) continue;
    const isOpen=prioGroupOpen['prio_open_'+g.id]!==false;
    gruposHtml+='<div class="prio-grupo">'
      +'<div class="prio-grupo-header" onclick="B.togglePrioGroup(\''+g.id+'\')">'
        +'<div class="prio-grupo-dot" style="background:'+g.dot+'"></div>'
        +'<div class="prio-grupo-label" style="color:'+g.dot+'">'+g.label+'</div>'
        +'<div class="prio-grupo-count">'+g.tasks.length+'</div>'
        +'<div class="prio-grupo-caret">'+(isOpen?'▾':'▸')+'</div>'
      +'</div>'
      +(isOpen?g.tasks.map(t=>prioCard(t,g.cls)).join(''):'')
      +'</div>';
  }

  if(!gruposHtml) gruposHtml='<div style="padding:24px;text-align:center;color:var(--tx3);font-size:13px">🎉 Nenhuma tarefa urgente — projeto em dia!</div>';

  const depoisHtml=prios.depois.length
    ?'<button class="done-tog" style="margin-top:4px" onclick="B.togglePrioGroup(\'depois\')">'
      +(prioGroupOpen['prio_open_depois']?'▾':'▸')+' mais tarde ('+prios.depois.length+')'
      +'</button>'
      +(prioGroupOpen['prio_open_depois']?'<div style="margin-top:8px">'+prios.depois.map(t=>prioCard(t,'radar')).join('')+'</div>':'')
    :'';

  // ── Coluna esquerda: lista de tarefas ─────────────────────────────────
  const colLeft='<div style="flex:1;min-width:0">'+msCard+gruposHtml+depoisHtml+'</div>';

  // ── Coluna direita: post-its de observações ───────────────────────────
  // Usa o mesmo array S.postits filtrado para proj='home_obs'
  // ou um array dedicado S.homeObs (mais limpo)
  const obsNotes = Array.isArray(S.homeObs) ? S.homeObs : [];
  const OBS_COLORS = [
    {bg:'#FFF9C4',name:'amarelo'},{bg:'#FCE4EC',name:'rosa'},
    {bg:'#E8F5E9',name:'verde'},{bg:'#E3F2FD',name:'azul'},
    {bg:'#FFF3E0',name:'laranja'},{bg:'#F3E5F5',name:'lilás'},
  ];

  const obsCards = obsNotes.length
    ? obsNotes.map((n,i)=>{
        const rot=['-1.5deg','1deg','-0.8deg','1.8deg','-1.2deg','0.7deg'][i%6];
        return '<div style="background:'+n.color+';border-radius:4px;padding:14px 12px;box-shadow:2px 3px 8px rgba(0,0,0,.1);transform:rotate('+rot+');cursor:pointer;position:relative;min-height:90px" onclick="B.editObsNote('+i+')">'
          +'<div style="font-size:13px;color:rgba(0,0,0,.75);line-height:1.5;white-space:pre-wrap">'+esc(n.texto)+'</div>'
          +(n.autor?'<div style="font-size:10px;color:rgba(0,0,0,.4);margin-top:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">'+esc(n.autor)+'</div>':'')
          +'<button onclick="event.stopPropagation();B.delObsNote('+i+')" style="position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:12px;color:rgba(0,0,0,.3);line-height:1">✕</button>'
          +'</div>';
      }).join('')
    : '<div style="font-size:12px;color:var(--tx3);text-align:center;padding:12px 0">Nenhuma nota ainda</div>';

  const colRight='<div style="width:220px;flex-shrink:0">'
    +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">'
      +'Observações'
      +'<button class="btn-sm" style="font-size:11px" onclick="B.addObsNote()">+ nota</button>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:12px">'+obsCards+'</div>'
    +'</div>';

  // ── Layout em 2 colunas ───────────────────────────────────────────────
  return header+'<div style="display:flex;gap:24px;align-items:flex-start">'+colLeft+colRight+'</div>';
}

function buildTC(proj, label, days, milestone, b, phases, color){
  const dots = phases.map(function(ph,i){
    const phaseDone = b.phaseScores ? b.phaseScores[i]>=1 : (ph.tids||[]).every(id=>getDone(id));
    const isCur = i===b.cur && !phaseDone;
    let dotStyle;
    if(phaseDone){
      dotStyle='width:7px;height:7px;border-radius:50%;background:'+color+';flex-shrink:0;';
    } else if(isCur){
      dotStyle='width:11px;height:11px;border-radius:50%;background:'+color+';flex-shrink:0;box-shadow:0 0 0 3px '+color+'33;margin:0 -2px;';
    } else {
      dotStyle='width:7px;height:7px;border-radius:50%;background:var(--surf);border:1.5px solid var(--bds);flex-shrink:0;box-sizing:border-box;';
    }
    const lblStyle='font-size:9px;text-align:center;line-height:1.25;margin-top:4px;white-space:nowrap;max-width:52px;overflow:hidden;text-overflow:ellipsis;'
      +(phaseDone||isCur?'color:'+color+';font-weight:'+(isCur?'700':'500')+';':'color:var(--tx3);font-weight:400;');
    return {dot:dotStyle,lbl:lblStyle,name:ph.name||ph.id,done:phaseDone,cur:isCur};
  });

  let stepperRow='<div style="display:flex;align-items:center;margin-top:11px;">';
  for(let i=0;i<dots.length;i++){
    if(i>0){
      const lineColor=(dots[i-1].done||dots[i-1].cur)?color+'44':'var(--bd)';
      stepperRow+='<div style="flex:1;height:1.5px;background:'+lineColor+';border-radius:1px;"></div>';
    }
    stepperRow+='<div style="'+dots[i].dot+'"></div>';
  }
  stepperRow+='</div>';

  let labelRow='<div style="display:flex;margin-top:4px;">';
  for(let j=0;j<dots.length;j++){
    if(j>0) labelRow+='<div style="flex:1;"></div>';
    labelRow+='<div style="'+dots[j].lbl+'">'+esc(dots[j].name)+'</div>';
  }
  labelRow+='</div>';

  const curPhase = phases[b.cur] ? (phases[b.cur].label||phases[b.cur].name||phases[b.cur].id||'') : 'sem fase';
  const subtitle = b.pct===100 ? 'todas as fases concluídas' : 'fase atual: '+curPhase;

  return '<div class="tc" style="position:relative">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+color+';border-radius:var(--rad) var(--rad) 0 0"></div>'
    +'<div class="tc-hdr"><div class="tc-lbl">'+label+'</div></div>'
    +'<div class="tc-days" style="color:'+color+'">'+b.pct+'%</div>'
    +'<div style="font-size:11px;color:var(--tx2);margin-bottom:11px;line-height:1.3">'+(b.total?b.done+'/'+b.total+' marcos · ':'')+esc(subtitle)+'</div>'
    +'<div class="bar-wrap">'
      +'<div class="bar-lbl"><span style="color:var(--tx3)">progresso</span><span style="color:'+color+';font-weight:600">'+b.pct+'%</span></div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+b.pct+'%;background:'+color+'"></div></div>'
      +stepperRow+labelRow
    +'</div></div>';
}

function buildMsList(proj, color){
  const raw = (S.projectMilestones||{})[proj]||[];
  if(!raw.length) return '';
  const ms = raw.slice().sort((a,b)=>{
    const da=parseMsDate(a.date),db=parseMsDate(b.date);
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
    return da-db;
  });
  const nearest = getNearestMilestone(proj);
  const rows = ms.map(m=>{
    const isNearest = nearest&&m.id===nearest.id;
    const dObj = parseMsDate(m.date);
    const daysLeft = dObj?dlu(dObj):null;
    const badge = isNearest?'<span style="font-size:10px;background:'+color+'22;color:'+color+';padding:1px 6px;border-radius:8px;font-weight:600">próximo</span>':'';
    return '<div class="ms-item" style="'+(isNearest?'border-color:'+color+'66;':'')+'">'
      +'<span class="ms-pill" style="background:'+color+'22;color:'+color+'">'+esc(m.date||'?')+'</span>'
      +(m.phaseId?'<span style="font-size:9px;background:var(--bd);color:var(--tx3);padding:1px 6px;border-radius:8px;margin-right:4px">'+esc(m.phaseId)+'</span>':'')
      +'<span class="ms-txt">'+esc(m.label)+'</span>'
      +badge
      +(daysLeft!==null?'<span style="font-size:11px;color:var(--tx3);margin-left:4px">'+daysLeft+'d</span>':'')
      +'<button class="ms-del" onclick="B.delMilestone(\''+proj+'\',\''+m.id+'\')">✕</button>'
      +'</div>';
  }).join('');
  return '<div class="sec">Milestones do projeto</div><div class="ms-list">'+rows+'</div>';
}

function buildTask(task){
  const proj  = task.p;
  const tid   = task.id;
  const done  = task.done;
  const title = getTarefaTitle(task);
  const date  = getTarefaDate(task);

  // Cor / label do projeto
  const cp       = (S.customProjects||[]).find(p=>p.id===proj);
  const projLabel= proj==='q'?'Quitanda':(cp?cp.name:proj);
  const pillCls  = proj==='q'?'pill-q':'';
  const pillSt   = cp?'background:'+cp.color+'22;color:'+cp.color+';':'';

  // Status
  const stKey  = (S.taskStatus||{})[tid]||'and';
  const stObj  = SM[stKey]||SM.and;
  const accentCls = done?'':({'atr':'st-atr','pri':'st-pri','agu':'st-agu','ibs':'st-ibs','pau':'st-pau'}[stKey]||'');

  // Comentários
  const cmts   = (S.taskComments||{})[tid]||[];
  const isExp  = !!EC[tid];

  const body = '<div class="tbody" style="padding-right:28px">'

    +(isExp?'▴ fechar':'▾ '+cntTxt)

  const cmtSection = '<div id="cmt-'+tid+'"'+(isExp?' style="display:block"':' hidden')+'>'+
    (isExp ? buildCmts(tid) : '')

  // ── Montar o card ─────────────────────────────────────────────────────

  return '<div class="ti '+(done?'done ':'')+accentCls+'" id="ti-'+tid+'" style="position:relative"'

    +' ondragstart="B.ds(event,\''+tid+'\')"'

    // Toggle comentários + seção de comentários
    +cmtToggle

}

function buildCmts(taskId){
  // fKey: chave segura para nome de função global (sem caracteres especiais)
  const fKey = taskId.replace(/[^a-z0-9]/gi,'_');

  // Registra funções no window — funcionam em qualquer onclick,
  // independente de escaping de aspas ou escopo de módulo ES6
  window['_ac_'+fKey] = () => B.addCmt(taskId);
  window['_ec_'+fKey] = (cId) => B.editCmt(taskId, cId);
  window['_dc_'+fKey] = (cId) => B.delCmt(taskId, cId);

  const cmts = (S.taskComments||{})[taskId]||[];
  const AUTORES = ['Lele','Luana','Pedro'];

  // ── Comentários existentes ────────────────────────────────────────────
  const rows = cmts.length
    ? cmts.map(c=>{
        const autor = c.autor||'?';
        const cor = autor==='Lele'?'#2A6B6B':autor==='Luana'?'#185FA5':'#854F0B';
        // cId seguro para passar como string literal no onclick
        const cIdStr = "'"+c.id+"'";
        return '<div class="cmt-item" id="ci-'+c.id+'">'
          +'<div class="cmt-header">'
            +'<div class="cmt-avatar" style="background:'+cor+'22;color:'+cor+'">'+autor[0].toUpperCase()+'</div>'
            +'<span class="cmt-autor">'+esc(autor)+'</span>'
            +'<span class="cmt-ts">'+ts(c.ts)+(c.edited?' · editado':'')+'</span>'
            +'<div class="cmt-acts">'
              +'<button class="cmt-act" onclick="_ec_'+fKey+'('+cIdStr+')" title="Editar">✎</button>'
              +'<button class="cmt-act" onclick="_dc_'+fKey+'('+cIdStr+')" title="Apagar">✕</button>'
            +'</div>'
          +'</div>'
          +'<div class="cmt-text" id="ct-'+c.id+'">'+esc(c.text)+'</div>'
          +'</div>';
      }).join('')
    : '<p class="cmt-empty">Nenhum comentário ainda.</p>';

  // ── Campo de novo comentário ──────────────────────────────────────────
  const autorOpts = AUTORES.map(a=>'<option>'+a+'</option>').join('');

  return '<div class="cmt-wrap">'
    +rows
    +'<div class="cmt-new">'
      +'<textarea class="cmt-new-inp" id="nc-'+fKey+'" rows="2"'
        +' placeholder="Escreva um comentário..."'
        +' oninput="ar(this)"'
        +' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();_ac_'+fKey+'()}"></textarea>'
      +'<div class="cmt-new-footer">'
        +'<div class="cmt-new-autor"><span>como</span>'
          +'<select id="nc-autor-'+fKey+'">'+autorOpts+'</select>'
        +'</div>'
        +'<button class="cmt-send" onclick="_ac_'+fKey+'()">↵ Enviar</button>'
      +'</div>'
    +'</div>'
    +'</div>';
}

// ── Timeline (preservada do original) ────────────────────────────────────────
function parseDate(str){
  if(!str||str==='a definir') return null;
  const s=str.toLowerCase().trim();
  if(s==='hoje'||s==='agora'){ const d=new Date(TODAY); return{start:d,end:d,duration:0}; }
  if(s.includes('esta semana')){ const d=new Date(TODAY),e=new Date(TODAY.getTime()+6*86400000); return{start:d,end:e,duration:6}; }
  const ateM=s.match(/at[eé]\s*(\d{1,2})\/(\d{1,2})/);
  if(ateM){ const end=new Date(2026,parseInt(ateM[2])-1,parseInt(ateM[1])); return{start:new Date(TODAY),end,duration:Math.max(0,Math.round((end-TODAY)/86400000))}; }
  const rangeM=str.match(/(\d{1,2})\/(\d{1,2})\s*[–\-]+\s*(\d{1,2})\/(\d{1,2})/);
  if(rangeM){ const start=new Date(2026,parseInt(rangeM[2])-1,parseInt(rangeM[1])),end=new Date(2026,parseInt(rangeM[4])-1,parseInt(rangeM[3])); return{start,end,duration:Math.max(0,Math.round((end-start)/86400000))}; }
  const singles=[...str.matchAll(/(\d{1,2})\/(\d{1,2})/g)];
  if(singles.length){ const last=singles[singles.length-1],d=new Date(2026,parseInt(last[2])-1,parseInt(last[1])); return{start:d,end:d,duration:0}; }
  return null;
}
function normalizeMilestones(){
  const items=[];
  for(const projId of ['q',...(S.customProjects||[]).map(p=>p.id)]){
    for(const m of (S.projectMilestones||{})[projId]||[]){
      if(!m.label||!m.date) continue;
      const d=parseMsDate(m.date); if(!d) continue;
      items.push({id:m.id,projectId:projId,title:m.label,type:'milestone',startDate:d,endDate:d,duration:0});
    }
  }
  return items;
}
function normalizeTasks(){
  const items=[],validProjs=new Set(['q',...(S.customProjects||[]).map(p=>p.id)]);
  for(const t of TDEFS){ if(!validProjs.has(t.p)||getDone(t.id)) continue; const r=parseDate(t.date); if(!r) continue; items.push({id:t.id,projectId:t.p,title:t.title,type:'task',startDate:r.start,endDate:r.end,duration:r.duration}); }
  for(const t of (S.customTasks||[])){ if(!t.p||!validProjs.has(t.p)||t.done) continue; const r=parseDate(t.date); if(!r) continue; items.push({id:t.id,projectId:t.p,title:t.title,type:'task',startDate:r.start,endDate:r.end,duration:r.duration}); }
  return items;
}
function getTimelineItems(){
  // Se o Sheets carregou com sucesso, usa os dados reais do cronograma
  if(sheetsData && sheetsData.length > 0){
    return getSheetsTimelineItems();
  }
  // Fallback: dados hardcoded de TDEFS + milestones do Firebase
  return [...normalizeMilestones(),...normalizeTasks()].sort((a,b)=>a.startDate-b.startDate);
}

// Converte sheetsData em TimelineItems compatíveis com buildTimeline
function getSheetsTimelineItems(){
  const items = [];
  
  // Atividades do Sheets (excluindo linhas de etapa pai, que são só cabeçalhos)
  for(const row of sheetsData){
    if(row.isEtapa) continue; // E1, E2… são cabeçalhos de grupo, não atividades
    items.push({
      id: row.id,
      projectId: 'q',
      title: row.label,
      type: 'task',
      startDate: row.start,
      endDate: row.end,
      duration: Math.round((row.end - row.start)/86400000),
      fase: row.fase,
    });
  }
  
  // Milestones do Firebase sobrepostos (o time pode adicionar marcos extras)
  for(const m of normalizeMilestones()){
    items.push(m);
  }
  
  return items.sort((a,b)=>a.startDate-b.startDate);
}

// Retorna etapas pai do Sheets (para legenda da timeline)
function getSheetsEtapas(){
  if(!sheetsData||!sheetsData.length) return [];
  return sheetsData.filter(r=>r.isEtapa);
}

function buildTimeline(allMs){
  // ── Fonte de dados ────────────────────────────────────────────────────
  const fonteBadge = sheetsData===null
    ? '<span style="font-size:11px;color:var(--p);background:var(--pl);padding:2px 8px;border-radius:8px">⏳ carregando cronograma...</span>'
    : sheetsData.length>0
      ? '<span style="font-size:11px;color:var(--n);background:var(--nl);padding:2px 8px;border-radius:8px">📊 Google Sheets</span>'
      : '<span style="font-size:11px;color:var(--tx3);background:var(--bd);padding:2px 8px;border-radius:8px;cursor:pointer" onclick="loadSheetsData().then(d=>{if(d.length)render()})">📋 dados locais — tentar novamente</span>';

  // ── Construir itens do Gantt por fase ─────────────────────────────────
  // Cada linha = uma fase. Barra = período das tarefas da fase.
  // Diamantes = milestones do Firebase para aquela fase.
  // Linha vertical = hoje.

  // Calcular janela de tempo total
  const msFirebase = (S.projectMilestones||{})['q']||[];

  // Coletar todas as datas para definir o span
  const allDates = [new Date('2026-04-22')]; // início do projeto
  for(const d of TDEFS){
    const m = d.date.match(/(\d{1,2})\/(\d{1,2})/);
    if(m) allDates.push(new Date(2026,parseInt(m[2])-1,parseInt(m[1])));
    const parts = d.date.split('–');
    if(parts.length>1){
      const m2 = parts[1].trim().match(/(\d{1,2})\/(\d{1,2})/);
      if(m2) allDates.push(new Date(2026,parseInt(m2[2])-1,parseInt(m2[1])));
    }
  }
  for(const m of msFirebase){
    const d = parseMsDate(m.date);
    if(d) allDates.push(d);
  }
  // Sheets data
  if(sheetsData&&sheetsData.length){
    for(const r of sheetsData){ if(r.start) allDates.push(r.start); if(r.end) allDates.push(r.end); }
  }

  const minD = new Date(Math.min(...allDates));
  minD.setDate(1); // início do mês
  const maxD = new Date(Math.max(...allDates));
  maxD.setMonth(maxD.getMonth()+1,0); // fim do mês seguinte

  const totalSpan = Math.max(1, maxD-minD);
  function pct(d){ return Math.max(0,Math.min(100,((d-minD)/totalSpan)*100)); }
  function pw(s,e){ return Math.max(0.5, ((e-s)/totalSpan)*100); }

  // ── Cabeçalho de meses ────────────────────────────────────────────────
  const months=[];
  let mc=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(mc<=maxD){
    const next=new Date(mc.getFullYear(),mc.getMonth()+1,1);
    months.push({
      label:mc.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}),
      left:pct(mc),
      width:pct(next)-pct(mc)
    });
    mc=next;
  }
  const headerMos=months.map(m=>
    '<div style="position:absolute;left:'+m.left+'%;width:'+m.width+'%;padding-left:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);border-left:1px solid var(--bd);box-sizing:border-box;overflow:hidden">'+m.label+'</div>'
  ).join('');

  const LANE_H = 52;
  const LABEL_W = 120;

  // Linhas verticais dos meses
  const vlines = months.map(m=>
    '<div style="position:absolute;left:'+m.left+'%;top:0;bottom:0;width:1px;background:var(--bd);opacity:.5"></div>'
  ).join('');

  // Linha de hoje
  const todayPct = pct(TODAY);
  const todayLine = '<div style="position:absolute;left:'+todayPct+'%;top:0;bottom:0;width:2px;background:var(--urg);z-index:10">'
    +'<div style="position:absolute;bottom:100%;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--urg);background:var(--bg);padding:1px 4px;border-radius:3px;border:1px solid var(--urg);white-space:nowrap">hoje</div>'
    +'</div>';

  // ── Linhas por fase ───────────────────────────────────────────────────
  let rows = '';
  for(const fase of FASES){
    // Período da fase: das tarefas do TDEFS ou Sheets
    let faseStart, faseEnd;

    if(sheetsData&&sheetsData.length){
      const fi = sheetsData.filter(r=>r.fase===fase.id&&!r.isEtapa);
      if(fi.length){
        faseStart = new Date(Math.min(...fi.map(r=>+r.start)));
        faseEnd   = new Date(Math.max(...fi.map(r=>+r.end)));
      }
    }

    if(!faseStart){
      // Fallback: usar datas de TDEFS
      const td = TDEFS.filter(t=>TAREFA_FASE[t.id]===fase.id);
      if(!td.length) continue;
      const starts=[], ends=[];
      for(const t of td){
        const parts = t.date.split('–');
        const m1 = parts[0].trim().match(/(\d{1,2})\/(\d{1,2})/);
        if(m1) starts.push(new Date(2026,parseInt(m1[2])-1,parseInt(m1[1])));
        const m2 = (parts[1]||parts[0]).trim().match(/(\d{1,2})\/(\d{1,2})/);
        if(m2) ends.push(new Date(2026,parseInt(m2[2])-1,parseInt(m2[1])));
      }
      if(!starts.length) continue;
      faseStart = new Date(Math.min(...starts));
      faseEnd   = new Date(Math.max(...ends.length?ends:starts));
    }

    const isCur = faseStart<=TODAY && faseEnd>=TODAY;
    const isPast = faseEnd<TODAY;
    const barOpacity = isPast?'.3':isCur?'.85':'.5';
    const barLeft = pct(faseStart);
    const barW = pw(faseStart,faseEnd);

    // Milestones desta fase
    const faseMilestones = msFirebase.filter(m=>m.phaseId===fase.id);

    // Lane interna
    let laneInner = vlines + todayLine;

    // Barra da fase
    laneInner += '<div style="position:absolute;top:50%;transform:translateY(-50%);left:'+barLeft+'%;width:'+barW+'%;height:12px;border-radius:6px;background:'+fase.cor+';opacity:'+barOpacity+'"></div>';

    // Milestones como diamantes
    let alternateAbove = true;
    for(const ms of faseMilestones){
      const d = parseMsDate(ms.date);
      if(!d) continue;
      const l = pct(d);
      const isPastMs = d < TODAY;
      const msCor = isPastMs ? 'var(--tx3)' : fase.cor;
      const lbl = ms.label.length>18 ? ms.label.slice(0,16)+'…' : ms.label;
      laneInner += '<div style="position:absolute;left:'+l+'%;top:50%;z-index:6">'
        +'<div style="width:12px;height:12px;background:'+msCor+';transform:translate(-50%,-50%) rotate(45deg);border-radius:2px;box-shadow:0 0 0 2px var(--bg)"></div>'
        +'<div style="position:absolute;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:'+msCor+';background:var(--bg);padding:1px 5px;border-radius:4px;white-space:nowrap;'+(alternateAbove?'bottom:calc(6px + 8px)':'top:calc(6px + 8px)')+'" title="'+esc(ms.label)+'">'+esc(lbl)+'</div>'
        +'</div>';
      alternateAbove = !alternateAbove;
    }

    // Linha da fase
    const labelColor = isCur ? fase.cor : isPast ? 'var(--tx3)' : 'var(--tx2)';
    const dotStyle = isCur
      ? 'width:10px;height:10px;border-radius:50%;background:'+fase.cor+';box-shadow:0 0 0 3px '+fase.cor+'33;flex-shrink:0'
      : isPast
        ? 'width:8px;height:8px;border-radius:50%;background:var(--bds);flex-shrink:0'
        : 'width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bds);flex-shrink:0;box-sizing:border-box';

    rows += '<div style="display:flex;border-bottom:0.5px solid var(--bd);height:'+LANE_H+'px">'
      +'<div style="width:'+LABEL_W+'px;flex-shrink:0;display:flex;align-items:center;gap:7px;padding:0 12px;border-right:1px solid var(--bd);background:var(--surf)">'
        +'<div style="'+dotStyle+'"></div>'
        +'<div style="font-size:11px;font-weight:600;color:'+labelColor+';line-height:1.2">'+esc(fase.labelCurto)+(isCur?'<div style="font-size:9px;opacity:.7">fase atual</div>':'')+'</div>'
      +'</div>'
      +'<div style="flex:1;position:relative;height:'+LANE_H+'px;background:var(--bg);overflow:hidden">'+laneInner+'</div>'
      +'</div>';
  }

  // ── Montar o Gantt ────────────────────────────────────────────────────
  const gantt = '<div style="overflow-x:auto;border-radius:var(--rads);border:1px solid var(--bd);margin-top:12px">'
    // Cabeçalho de meses
    +'<div style="display:flex;border-bottom:2px solid var(--bd);background:var(--surf)">'
      +'<div style="width:'+LABEL_W+'px;flex-shrink:0;padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);border-right:1px solid var(--bd)">Fase</div>'
      +'<div style="flex:1;position:relative;height:28px">'
        +headerMos
      +'</div>'
    +'</div>'
    +rows
    +'</div>';

  const legend = '<div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">'
    +'<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)"><div style="width:24px;height:8px;border-radius:4px;background:var(--n)"></div>período da fase</div>'
    +'<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)"><div style="width:10px;height:10px;background:var(--n);transform:rotate(45deg);border-radius:2px;flex-shrink:0"></div>milestone</div>'
    +'<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)"><div style="width:2px;height:14px;background:var(--urg)"></div>hoje</div>'
    +'</div>';

  return '<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
    +legend+fonteBadge
    +'</div>'
    +gantt
    +'<div style="margin-top:10px;font-size:11px;color:var(--tx3)">Clique em + milestone para adicionar marcos ao cronograma</div>';
}

// Comentários
B.toggleCmt = function(taskId){
  EC[taskId] = !EC[taskId];

  // Encontra TODOS os painéis com esse taskId (pode haver em home + tarefas)
  // Opera em cada um individualmente — sem getElementById global
  document.querySelectorAll('div[id="cmt-'+taskId+'"]').forEach(wrap=>{
    if(EC[taskId]){
      // Popula o painel ao abrir (estava vazio para evitar IDs duplicados)
      wrap.innerHTML = buildCmts(taskId);
      wrap.hidden = false;
    } else {
      // Ao fechar: esvazia para remover os IDs do DOM
      wrap.innerHTML = '';
      wrap.hidden = true;
    }
  });

  // Atualiza botão de toggle
  document.querySelectorAll('[id="expbtn-'+taskId+'"]').forEach(btn=>{
    const cnt = ((S.taskComments||{})[taskId]||[]).length;
    btn.textContent = EC[taskId]
      ? '▴ fechar'
      : '▾ '+(cnt ? cnt+' comentário'+(cnt>1?'s':'') : 'comentários');
    btn.className = cnt&&!EC[taskId] ? 'exp-btn has-c' : 'exp-btn';
  });
};

B.addCmt = async function(taskId){
  // Busca o textarea dentro do painel ABERTO (não hidden)
  // Usa querySelector com contexto do painel visível — evita pegar o elemento errado
  let el = null;
  document.querySelectorAll('div[id="cmt-'+taskId+'"]').forEach(wrap=>{
    if(!wrap.hidden){
      const fKey = taskId.replace(/[^a-z0-9]/gi,'_');
      const found = wrap.querySelector('#nc-'+fKey) || wrap.querySelector('textarea.cmt-new-inp');
      if(found) el = found;
    }
  });

  if(!el || !el.value.trim()) return;

  // Autor: busca o select no mesmo painel
  let autor = 'Lele';
  const fKey = taskId.replace(/[^a-z0-9]/gi,'_');
  const autorEl = el.closest('.cmt-wrap')
    ? el.closest('.cmt-wrap').querySelector('#nc-autor-'+fKey) || el.closest('.cmt-wrap').querySelector('select')
    : null;
  if(autorEl) autor = autorEl.value;

  if(!S.taskComments) S.taskComments = {};
  if(!S.taskComments[taskId]) S.taskComments[taskId] = [];
  S.taskComments[taskId].push({
    id: uid(), text: el.value.trim(), autor, ts: Date.now(), edited: false
  });

  el.value = '';
  el.style.height = 'auto';
  await save('Comentário salvo ✓');

  // Reconstrói apenas os painéis abertos
  document.querySelectorAll('div[id="cmt-'+taskId+'"]').forEach(wrap=>{
    if(!wrap.hidden){
      wrap.innerHTML = buildCmts(taskId);
    }
  });

  // Atualiza contador
  document.querySelectorAll('[id="expbtn-'+taskId+'"]').forEach(btn=>{
    const cnt = S.taskComments[taskId].length;
    btn.textContent = '▴ fechar';
    btn.className = 'exp-btn has-c';
  });
};

B.delCmt = async function(taskId, cId){
  if(!S.taskComments||!S.taskComments[taskId]) return;
  if(!confirm('Apagar este comentário?')) return;
  S.taskComments[taskId] = S.taskComments[taskId].filter(c=>c.id!==cId);
  await save('Comentário removido');
  document.querySelectorAll('div[id="cmt-'+taskId+'"]').forEach(wrap=>{
    if(!wrap.hidden) wrap.innerHTML = buildCmts(taskId);
  });
  document.querySelectorAll('[id="expbtn-'+taskId+'"]').forEach(btn=>{
    const cnt = (S.taskComments[taskId]||[]).length;
    btn.textContent = cnt ? '▴ fechar' : '▾ comentários';
    btn.className = cnt ? 'exp-btn has-c' : 'exp-btn';
  });
};

B.editCmt = function(taskId, cId){
  const el = document.getElementById('ct-'+cId);
  if(!el) return;
  const orig = el.textContent;
  const inp = document.createElement('textarea');
  inp.style.cssText = 'width:100%;font-size:13px;font-family:\'DM Sans\',sans-serif;padding:6px 8px;border-radius:6px;border:0.5px solid var(--n);background:var(--bg);color:var(--tx);outline:none;resize:none;line-height:1.5;box-sizing:border-box;margin-top:2px';
  inp.value = orig;
  inp.rows = Math.max(2, orig.split('\n').length);
  el.replaceWith(inp);
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);

  async function salvar(){
    const txt = inp.value.trim()||orig;
    const c = (S.taskComments[taskId]||[]).find(x=>x.id===cId);
    if(c){ c.text=txt; c.edited=true; }
    await save('Comentário editado');
    document.querySelectorAll('div[id="cmt-'+taskId+'"]').forEach(wrap=>{
      if(!wrap.hidden) wrap.innerHTML = buildCmts(taskId);
    });
  }

  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); salvar(); }
    if(e.key==='Escape'){ render(); }
  });
  inp.addEventListener('blur', ()=>setTimeout(salvar, 150));
};

B.saveAlertById = async function(proj,aid,val){

// Drag & drop tarefas
let dragId=null;
B.ds=function(e,id){dragId=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
B.dov=function(e){e.preventDefault();e.currentTarget.classList.add('drag-over');};
B.dl=function(e){e.currentTarget.classList.remove('drag-over');};
B.de=function(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));};
B.dd=async function(e,targetId,proj){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId||dragId===targetId) return;
  if(!S.taskOrder) S.taskOrder={};
  const all=projTasks(proj).map(t=>t.id);
  const fi=all.indexOf(dragId),ti=all.indexOf(targetId);
  if(fi<0||ti<0) return;
  all.splice(fi,1);all.splice(ti,0,dragId);
  S.taskOrder[proj]=all;dragId=null;
  await save();render();
};

// Drag & drop post-its
let pitDragId=null;
B.pitDs=function(e,el){pitDragId=el.id.replace('pit-','');e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('pit-dragging'),0);};
B.pitDov=function(e,el){e.preventDefault();document.querySelectorAll('.pit-over').forEach(x=>x.classList.remove('pit-over'));if(el.id!=='pit-'+pitDragId)el.classList.add('pit-over');};
B.pitDl=function(e,el){el.classList.remove('pit-over');};
B.pitDd=async function(e,el){
  e.preventDefault();document.querySelectorAll('.pit-over,.pit-dragging').forEach(x=>x.classList.remove('pit-over','pit-dragging'));
  const targetId=el.id.replace('pit-','');
  if(!pitDragId||pitDragId===targetId) return;
  const pits=Array.from(S.postits||[]);
  const fromIdx=pits.findIndex(p=>p.id===pitDragId),toIdx=pits.findIndex(p=>p.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  const item=pits.splice(fromIdx,1)[0];pits.splice(toIdx,0,item);
  S.postits=pits;pitDragId=null;
  await save();render();
};

/* ═══════════════════════════════════════════════════════════════════════
   BLOCO 14 — SISTEMA DE MODAIS (templates)
   openTemplate() clona um <template> e injeta no #modal.
   Muito mais legível e editável do que concatenação de string.
═══════════════════════════════════════════════════════════════════════ */
function openTemplate(templateId, setup, focusId){
  const tpl = document.getElementById(templateId);
  if(!tpl) return;
  const el = tpl.content.cloneNode(true);
  const div = document.createElement('div');
  div.appendChild(el);
  if(setup) setup(div);
  document.getElementById('modal').innerHTML='';
  document.getElementById('modal').appendChild(div);
  document.addEventListener('keydown', escClose);
  if(focusId){
    setTimeout(()=>{ const f=document.getElementById(focusId); if(f) f.focus(); }, 80);
  }
}

function showModal(html){
  document.getElementById('modal').innerHTML=html;
  setTimeout(()=>{ const el=document.querySelector('#modal input,#modal textarea,#modal select'); if(el) el.focus(); }, 80);
  document.addEventListener('keydown', escClose);
}

function escClose(e){ if(e.key==='Escape'){ B.closeModal(); document.removeEventListener('keydown',escClose); } }
B.closeModal = function(){ document.getElementById('modal').innerHTML=''; document.removeEventListener('keydown',escClose); };

// Arquivo de projetos
function doArchive(id,name,emoji,color,fixed){
  const tasks=fixed?[]:(S.customTasks||[]).filter(t=>t.p===id).map(t=>({...t}));
  const milestones=((S.projectMilestones||{})[id]||[]).map(m=>({...m}));
  const alerts=((S.projectAlerts||{})[id]||[]).map(a=>({...a}));
  if(!Array.isArray(S.archivedProjects)) S.archivedProjects=[];
  S.archivedProjects=S.archivedProjects.filter(p=>p.id!==id);
  S.archivedProjects.push({id,name,emoji,color,tasks,milestones,alerts,archivedAt:Date.now(),fixed});
  if(!fixed){ S.customProjects=(S.customProjects||[]).filter(p=>p.id!==id); S.customTasks=(S.customTasks||[]).filter(t=>t.p!==id); }
  if(S.projectMilestones&&S.projectMilestones[id]) delete S.projectMilestones[id];
  if(S.projectAlerts&&S.projectAlerts[id]) delete S.projectAlerts[id];
  S.updates=S.updates||[];
  S.updates.push({id:uid(),text:'Projeto arquivado: '+(emoji||'')+' '+name,ts:Date.now()});
  if(V===id) V='arch';
}

// Auto-resize de textareas
function ar(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
function attachEv(){
  // Auto-resize de textareas existentes
  document.querySelectorAll('textarea').forEach(el=>{
    if(el.value){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
  });
}

// ── Delegação de eventos global para comentários ──────────────────────────
// Registrado UMA vez no document — funciona para qualquer elemento dinâmico.
// Evita problemas de escaping de aspas no onclick.
document.addEventListener('click', function(e){
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const taskId = btn.dataset.task;
  const cmtId  = btn.dataset.cmt;

  if(action==='addcmt' && taskId){
    e.preventDefault();
    B.addCmt(taskId);
  } else if(action==='editcmt' && taskId && cmtId){
    e.preventDefault();
    B.editCmt(taskId, cmtId);
  } else if(action==='delcmt' && taskId && cmtId){
    e.preventDefault();
    B.delCmt(taskId, cmtId);
  }
});

// Enter no textarea de comentário
document.addEventListener('keydown', function(e){
  if(e.key!=='Enter'||e.shiftKey) return;
  const ta = e.target.closest('textarea.cmt-new-inp');
  if(!ta) return;
  const taskId = ta.dataset.task;
  if(taskId){ e.preventDefault(); B.addCmt(taskId); }
});
